  architecture: standalone
  auth:
    enabled: true
    password: 7p9iWVeRV4S944

## API properties
api:
  existingSecret: false
  enabled: true
  image: azbuilder/api-server
  version: ''
  replicaCount: '1'
  serviceType: ClusterIP
  serviceAccountName: ''
  rbac:
    create: false
    roleName: terrakube-api-role
    roleBindingName: terrakube-api-role-binding
  secrets:
    - terrakube-api-secrets
  resources: {}
  podLabels: {}
  podAnnotations: {}
  defaultDatabase: true
  defaultRedis: true
  loadSampleData: true
  terraformReleasesUrl: https://releases.hashicorp.com/terraform/index.json
  securityContext: {}
  containerSecurityContext: {}
  imagePullSecrets: []
  initContainers: []
  startupProbe:
    failureThreshold: 30
    periodSeconds: 10
  readinessProbe:
    initialDelaySeconds: 120
    periodSeconds: 10
  livenessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
  cache:
    moduleCacheMaxTotal: '128'
    moduleCacheMaxIdle: '128'
    moduleCacheMinIdle: '64'
    moduleCacheTimeout: '600000'
    moduleCacheSchedule: 0 */3 * ? * *
  properties:
    databaseType: POSTGRESQL
    databaseHostname: ''
    databaseName: ''
    databaseUser: ''
    databaseSchema: public
    databasePassword: ''
    databaseSslMode: disable
    databasePort: '5432'
    redisHostname: ''
    redisPassword: ''
    redisPort: '6379'
    executorUrl: http://terrakube-executor-service:8090
  env:
    - name: SERVICE_BINDING_ROOT
      value: /mnt/platform/bindings
  volumes:
    - name: ca-certs
      secret:
        secretName: terrakube-ca-secrets
        items:
          - key: rootCA.pem
            path: rootCA.pem
          - key: intermediateCA.pem
            path: intermediateCA.pem
          - key: type
            path: type
  volumeMounts:
    - name: ca-certs
      mountPath: /mnt/platform/bindings/ca-certificates
      readOnly: true

## The database port is only used for mysql databases

## SslMode values are disable, allow, prefer, require, verify-ca, verify-full. Default mode is "disable".   
## Reference: https://jdbc.postgresql.org/documentation/publicapi/org/postgresql/PGProperty.html#SSL_MODE

