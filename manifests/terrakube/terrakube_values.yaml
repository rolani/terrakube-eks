  defaultStorage: false
  aws:
    accessKey: AKIA5GP2CRTNPWHVIVG4
    secretKey: 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
    bucketName: my-terrakube-bucket-eks
    region: us-east-1

# Default Database Postgresql
