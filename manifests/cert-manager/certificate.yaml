# certificate.yaml
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: terrakube
spec:
  secretName: www-richolaniyan
  dnsNames:
    - '*.richolaniyan.com'
    - richolaniyan.com
  usages:
    - digital signature
    - key encipherment
    - server auth
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer