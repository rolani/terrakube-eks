## Ingress properties
ingress:
  useTls: true
  includeTlsHosts: true
  ui:
    enabled: true
    domain: "terrakube-ui.richolaniyan.com"
    path: "/"
    pathType: "Prefix"
    ingressClassName: "nginx"
    tlsSecretName: tls-secret-ui-terrakube
    annotations:
      nginx.ingress.kubernetes.io/use-regex: "true"
      cert-manager.io/cluster-issuer: letsencrypt-production
      external-dns.alpha.kubernetes.io/hostname: terrakube-ui.richolaniyan.com
  api:
    enabled: true
    domain: "terrakube-api.richolaniyan.com"
    path: "/"
    pathType: "Prefix"
    ingressClassName: "nginx"
    tlsSecretName: tls-secret-api-terrakube
    annotations:
      nginx.ingress.kubernetes.io/use-regex: "true"
      nginx.ingress.kubernetes.io/configuration-snippet: "proxy_set_header Authorization $http_authorization;"
      cert-manager.io/cluster-issuer: letsencrypt-production
      external-dns.alpha.kubernetes.io/hostname: terrakube-api.richolaniyan.com
  registry:
    enabled: true
    domain: "terrakube-reg.richolaniyan.com"
    path: "/"
    pathType: "Prefix"
    ingressClassName: "nginx"
    tlsSecretName: tls-secret-reg-terrakube
    annotations:
      nginx.ingress.kubernetes.io/use-regex: "true"
      nginx.ingress.kubernetes.io/configuration-snippet: "proxy_set_header Authorization $http_authorization;"
      cert-manager.io/cluster-issuer: letsencrypt-production
      external-dns.alpha.kubernetes.io/hostname: terrakube-reg.richolaniyan.com
  dex:
    enabled: true
    path: "/dex/"
    pathType: "Prefix"
    ingressClassName: "nginx"
    annotations:
      nginx.ingress.kubernetes.io/use-regex: "true"
      nginx.ingress.kubernetes.io/configuration-snippet: "proxy_set_header Authorization $http_authorization;"
      cert-manager.io/cluster-issuer: letsencrypt-production
  executor:
    enabled: false
    domain: "terrakube-executor.richolaniyan.com"
    path: "/"
    pathType: "Prefix"
    ingressClassName: "nginx"
    tlsSecretName: tls-secret-executor-terrakube    
    annotations:
      nginx.ingress.kubernetes.io/use-regex: "true"
      cert-manager.io/cluster-issuer: letsencrypt-production
      external-dns.alpha.kubernetes.io/hostname: terrakube-executor.richolaniyan.com
